<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>My Concert Log</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="wrap">
        <h1>My Concert Log</h1>
        <p class="sub">Every show I've been to, sortable however I like.</p>
        

        <div class="controls">
            <button id="sort-date" onclick="setSort('date')">Sort by Date</button>
            <button id="sort-artist" onclick="setSort('artist')">Sort by Artist</button>
            <button id="sort-venue" onclick="setSort('venue')">Sort by Venue</button>
        </div>

        
        <div id="list"></div>
        </div>
        
        <script>
        let concerts = [
            { artist: "Bob Moses", venue: "9:30 Club", date: "2022-03-30", openers: "Amtrac", seats: "VIP/GA", city: "Washington", state: "DC"},
            { artist: "Metallica", venue: "PNC Park", date: "2022-08-14", openers: "Ice Nine Kills, Greta Van Fleet", city: "Pittsburg", state: "PA"},
            { artist: "Rammstein", venue: "Lincoln Financial Field", date: "2022-08-31", city: "Philadelphia", state: "PA" },
            { artist: "Bad Bunny", venue: "Wells Fargo Center", date: "2024-04-19", city: "Philadelphia", state: "PA" },
            { artist: "Red Hot Chili Peppers", seats: "GA", venue: "Hersheypark Stadium", openers: "St. Vincent", date: "2023-09-27", city: "Hershey", state: "PA" },
            { artist: "Foo Fighters", venue: "Hersheypark Stadium", openers: "The Hives, AMYL and The Sniffers", date: "2024-07-23", city: "Hershey", state: "PA" },
            { artist: "Deftones", seats: "GA/FLOOR", venue: "Nationwide Arena", openers: "Fleshwater, The Mars Volta", date: "2025-03-29", city: "Columbus", state: "OH" },
            { artist: "Gorillaz", venue: "The Met Philadelphia", openers: "EarthGang", date: "2022-10-15", city: "Philadelphia", state: "PA" },
            { artist: "Abhi The Nomad", seats: "GA", venue: "Howard Theatre", date: "2024-10-10", city: "Washington", state: "DC" },
            { artist: "Childish Gambino", venue: "Schottenstein Center", openers: "WILLOW", date: "2024-08-15", city: "Columbus", state: "OH" }




        ];
        
        let currentSort = "date";
        
        function setSort(field) {
            currentSort = field;
            document.querySelectorAll(".controls button").forEach(b => b.classList.remove("active"));
            document.getElementById("sort-" + field).classList.add("active");
            render();
        }
        
        
        
        function render() {
            const sorted = [...concerts].sort((a, b) => {
            if (currentSort === "date") return b.date.localeCompare(a.date); // newest first
            return (a[currentSort || ""]).localeCompare(b[currentSort] || "");
            });
        
            const list = document.getElementById("list");
            if (sorted.length === 0) {
            list.innerHTML = '<div class="empty">No concerts yet — add your first one above.</div>';
            
            return;
            }
        
            list.innerHTML = sorted.map(c => {
            const d = new Date(c.date + "T00:00:00");
            const formatted = d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
            const cityState = [c.city, c.state].filter(Boolean).join(", ");
            return `
                <div class="concert">
                <div class="meta">
                    <strong>${escapeHtml(c.artist)}</strong>
                    <div class="venue">${escapeHtml(c.venue || "Venue unknown")}${cityState ? " / " + escapeHtml(cityState) : ""}</div>
                    ${c.openers ? `<div class="openers">Guest(s): ${escapeHtml(c.openers)}</div>` : ""}
                    ${c.seats ? `<div class="seats">Seats: ${escapeHtml(c.seats)}</div>` : ""}
                </div>
                <div class="date">${formatted}</div>
                <div class="openers"></div>
                </div>
            `;
            }).join("");
        }
        
        function escapeHtml(str) {
            const div = document.createElement("div");
            div.textContent = str;
            return div.innerHTML;
        }
        
        setSort("date");
        </script>
        </body>
        </html>
