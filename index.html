<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Berenice's Concert Log</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="wrap">
        <h1>Berenice's Concert Log</h1>
        <p class="sub">Every show I've been to, sortable however I like.</p>
        

        <div class="controls">
            <button id="sort-date" onclick="setSort('date')">Sort by Date</button>
            <button id="sort-artist" onclick="setSort('artist')">Sort by Artist</button>
            <button id="sort-venue" onclick="setSort('venue')">Sort by Venue</button>
        </div>

        
        <div id="list"></div>
        </div>
        
        <script>
        let concerts = [
            { artist: "Bob Moses", venue: "9:30 Club", date: "2022-03-30", openers: "Amtrac", seats: "VIP/GA", city: "Washington", state: "DC", page:"learn-more/moses-22-03-30.html"},
            { artist: "Metallica", venue: "PNC Park", date: "2022-08-14", openers: "Ice Nine Kills, Greta Van Fleet", city: "Pittsburg", state: "PA", page:"learn-more/metallica-22-08-14.html" },
            { artist: "Rammstein", venue: "Lincoln Financial Field", date: "2022-08-31", city: "Philadelphia", state: "PA", page: "learn-more/rammstein-22-08-31.html"},
            { artist: "Bad Bunny", venue: "Xfinity Mobile Arena", date: "2024-04-20", city: "Philadelphia", state: "PA", page: "learn-more/badbunny-24-04-20.html" },
            { artist: "Red Hot Chili Peppers", seats: "GA", venue: "Hersheypark Stadium", openers: "St. Vincent", date: "2023-09-27", city: "Hershey", state: "PA" , page: "learn-more/rhcp-23-09-27.html"},
            { artist: "Foo Fighters", venue: "Hersheypark Stadium", openers: "The Hives, AMYL and The Sniffers", date: "2024-07-23", city: "Hershey", state: "PA", page: "learn-more/foofighters-24-07-23.html"},
            { artist: "Deftones", seats: "GA/FLOOR", venue: "Nationwide Arena", openers: "Fleshwater, The Mars Volta", date: "2025-03-29", city: "Columbus", state: "OH" , page: "learn-more/deftones-25-03-29.html"},
            { artist: "Gorillaz", venue: "The Met Philadelphia", openers: "EarthGang", date: "2022-10-15", city: "Philadelphia", state: "PA", page: "learn-more/gorillaz-22-10-15.html"},
            { artist: "Abhi The Nomad", seats: "GA", venue: "Howard Theatre", date: "2024-10-10", city: "Washington", state: "DC", page: "learn-more/abhinomad-24-10-10.html" },
            { artist: "Childish Gambino", venue: "Schottenstein Center", openers: "WILLOW", seats: "GA", date: "2024-08-16", city: "Columbus", state: "OH", page: "learn-more/gambino-24-08-16.html"}, 
            { artist: "Sleeping With Sirens", seats:"GA", venue: "Kemba Live", openers: "Holding Absence, Teenage Joans", date: "2024-09-27", city: "Columbus", state: "OH", page: "learn-more/sirens-24-09-27.html"},
            { artist: "Cuco", seats: "GA", venue: "Newport Music Hall", date: "2025-10-26", city: "Columbus", state: "OH", page: "learn-more/cuco-25-10-26.html" },
            { artist: "NLE Choppa", venue: "Newport Music Hall", seats: "GA", date: "2025-02-06", city: "Columbus", state: "OH", page: "learn-more/nlechoppa-25-02-06.html"},  
            { artist: "Jordana", seats: "GA", venue: "Skully's Music Diner", openers: "the booyah! kids", date: "2026-03-28", city: "Columbus", state: "OH", page: "learn-more/jordana-26-03-28.html"},



        ];
        
                let currentSort = "date";
 
        function setSort(field) {
            currentSort = field;
            document.querySelectorAll(".controls button").forEach(function(b){ b.classList.remove("active"); });
            document.getElementById("sort-" + field).classList.add("active");
            render();
        }
 
        function render() {
            const sorted = [...concerts].sort(function(a, b) {
                if (currentSort === "date") return b.date.localeCompare(a.date);
                return (a[currentSort] || "").localeCompare(b[currentSort] || "");
            });
 
            const list = document.getElementById("list");
            list.innerHTML = sorted.map(function(c) {
                const d = new Date(c.date + "T00:00:00");
                const formatted = d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
                const cityState = [c.city, c.state].filter(Boolean).join(", ");
                return (
                    '<div class="concert">' +
                    '<div class="meta">' +
                    '<strong>' + escapeHtml(c.artist) + '</strong>' +
                    '<div class="venue">' + escapeHtml(c.venue || "Venue unknown") + (cityState ? " / " + escapeHtml(cityState) : "") + '</div>' +
                    (c.openers ? '<div class="openers">Guest(s): ' + escapeHtml(c.openers) + '</div>' : '') +
                    (c.seats ? '<div class="seats">Seats: ' + escapeHtml(c.seats) + '</div>' : '') +
                    '</div>' +
                    '<div class="card-right">' +
                    '<div class="date">' + formatted + '</div>' +
                    '<a class="learn-more" href="' + c.page + '">learn more →</a>' +
                    '</div>' +
                    '</div>'
                );
            }).join("");
        }
 
        function escapeHtml(str) {
            const div = document.createElement("div");
            div.textContent = str;
            return div.innerHTML;
        }
 
        setSort("date");
        </script>
    </body>
</html>
